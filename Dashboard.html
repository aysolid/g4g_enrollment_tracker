<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#172033;--muted:#64748b;--bg:#f5f7fb;--panel:#fff;--line:#dbe4ef;--nav:#17243b;--nav2:#223554;--blue:#2563eb;--teal:#0f9f9a;--green:#16a34a;--amber:#d97706;--red:#dc2626;--shadow:0 18px 50px rgba(15,23,42,.08);--radius:18px}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,var(--nav),var(--nav2));color:#dbeafe;padding:24px 18px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:28px}.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#14b8a6);display:grid;place-items:center;font-weight:800;color:#fff}.brand h1{font-size:18px;margin:0;color:#fff}.brand p{margin:2px 0 0;color:#93c5fd;font-size:12px}.section{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#a5b4fc;font-weight:800;margin:24px 0 8px}.nav{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;background:transparent;color:#e5edff;border:0;border-radius:12px;padding:12px 14px;text-align:left;cursor:pointer;font-weight:700}.nav.active,.nav:hover{background:#fff;color:#172033}.count{background:#2563eb;color:#fff;border-radius:999px;padding:2px 8px;font-size:12px}.nav.active .count{background:#e2e8f0;color:#172033}.main{min-width:0}.top{height:76px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:5}.title{display:flex;align-items:center;gap:18px}.title h2{margin:0;font-size:24px}.search{width:360px;max-width:40vw;border:1px solid var(--line);border-radius:12px;padding:12px 14px}.status{font-size:12px;color:var(--muted)}.content{padding:28px}.hero{border-radius:24px;background:linear-gradient(135deg,#fff,#eef6ff);padding:28px;border:1px solid #d8e6f7;box-shadow:var(--shadow);margin-bottom:22px}.hero h2{font-size:30px;margin:0 0 8px}.hero p{color:var(--muted);margin:0}.cards{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:16px;margin:18px 0}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.card small{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800}.card strong{display:block;font-size:30px;margin-top:10px}.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}.panel h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line)}.body{padding:18px}.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}.filters select,.filters button{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}.primary{background:var(--blue);color:#fff}.soft{background:#eaf0ff;color:#1d4ed8}.danger{background:#fee2e2;color:#991b1b}.success{background:#dcfce7;color:#166534}.tablewrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:var(--radius)}table{border-collapse:collapse;width:100%;min-width:980px}th,td{border-bottom:1px solid #edf2f7;padding:12px;text-align:left;vertical-align:top;font-size:13px}th{background:#f8fafc;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:#334155}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-weight:800;font-size:12px;background:#eef2ff;color:#1d4ed8}.yes,.eligible{background:#dcfce7;color:#166534}.no,.ineligible{background:#fee2e2;color:#991b1b}.warn,.review{background:#ffedd5;color:#9a3412}.preview{max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.grid2{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:20;display:none;align-items:center;justify-content:center;padding:24px}.modalbox{background:#fff;border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.25);max-width:980px;width:min(980px,96vw);max-height:90vh;overflow:auto}.modalhead{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line)}.modalbody{padding:24px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:12px}.field label{display:block;font-weight:800;color:#475569;font-size:12px;margin-bottom:6px}input,select,textarea{border:1px solid var(--line);border-radius:10px;padding:10px;width:100%}textarea{min-height:90px}.empty{text-align:center;color:var(--muted);padding:28px}@media(max-width:1000px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.cards,.grid2{grid-template-columns:1fr}.search{max-width:none;width:100%}.top{height:auto;align-items:flex-start;gap:12px;flex-direction:column;padding:18px}}
  </style>
</head>
<body>
<? var encoded = initialData || ''; ?>
<script>window.__INITIAL_DATA__='<?= encoded ?>';</script>
<div class="app"><aside class="side"><div class="brand"><div class="logo">G4G</div><div><h1>G4G Research</h1><p>Enrollment command center</p></div></div><div id="nav"></div></aside><main class="main"><div class="top"><div class="title"><h2 id="pageTitle">Dashboard</h2><input id="search" class="search" placeholder="Search child, parent, email, notes…" oninput="render()"></div><div class="status" id="status"></div></div><div class="content" id="content"></div></main></div><div class="modal" id="modal"><div class="modalbox"><div class="modalhead"><h2 id="modalTitle"></h2><button class="btn soft" onclick="closeModal()">Close</button></div><div class="modalbody" id="modalBody"></div></div></div>
<script>
let data=normalize(decodeInitial());let page='dashboard';let selected=new Set();
const pages=[['dashboard','Overview','Dashboard'],['screening','Onboarding','Screening Review'],['eligible','Onboarding','Eligible'],['ineligible','Onboarding','Ineligible'],['participants','Participants','All Participants'],['prescreening','Participants','Prescreening'],['consent','Participants','Consent'],['ready','Participants','Ready for DARTS'],['followup','Operations','Manual Contact Queue'],['matching','Operations','Matching Center'],['professor','Operations','Professor Review'],['cohorts','Reports & Admin','Cohorts'],['reports','Reports & Admin','Reports'],['admin','Reports & Admin','Admin / Webhooks']];
function decodeInitial(){try{return JSON.parse(atob(window.__INITIAL_DATA__||''));}catch(e){return {error:String(e)}}}
function normalize(x){x=x&&typeof x==='object'?x:{};['participants','screening','eligibleParticipants','ineligibleParticipants','followups','needsReview','ready','matchReview','unmatchedConsents','prescreens','consents','cohorts','activity','dashboardRows'].forEach(k=>{if(!Array.isArray(x[k]))x[k]=[]});x.metrics=x.metrics||{};x.reports=x.reports||{actionItems:[]};x.reports.actionItems=Array.isArray(x.reports.actionItems)?x.reports.actionItems:[];x.urls=x.urls||{};return x}
function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function attr(v){return esc(v).replace(/'/g,'&#39;')}function badge(v){v=String(v||'Missing');let c=/yes|approved|eligible|completed|matched|ready/i.test(v)?'yes':/no|not eligible|ineligible|missing/i.test(v)?'no':/review|pending|needs/i.test(v)?'warn':'';return `<span class="badge ${c}">${esc(v)}</span>`}function setStatus(t){document.getElementById('status').textContent=t||`Loaded from spreadsheet: ${new Date(data.generatedAt||Date.now()).toLocaleString()}`}
function nav(){let html='',last='';pages.forEach(([id,sec,label])=>{if(sec!==last){html+=`<div class="section">${esc(sec)}</div>`;last=sec}html+=`<button class="nav ${page===id?'active':''}" onclick="show('${id}')"><span>${esc(label)}</span><span class="count">${countFor(id)}</span></button>`});document.getElementById('nav').innerHTML=html}
function countFor(id){return ({screening:data.screening.length,eligible:data.eligibleParticipants.length,ineligible:data.ineligibleParticipants.length,participants:data.participants.length,prescreening:data.prescreens.length,consent:data.consents.length,ready:data.ready.length,followup:data.followups.length,matching:data.matchReview.length+data.unmatchedConsents.length,professor:data.needsReview.length,cohorts:data.cohorts.length})[id]??''}
function show(id){page=id;selected.clear();render()}function render(){data=normalize(data);nav();document.getElementById('pageTitle').textContent=(pages.find(p=>p[0]===page)||[])[2]||'Dashboard';({dashboard,screening,eligible:()=>participantTable('Eligible Participants',data.eligibleParticipants),ineligible:()=>participantTable('Ineligible Participants',data.ineligibleParticipants),participants:()=>participantTable('All Participants',filter(data.participants)),prescreening:()=>simple('Prescreening Submissions',data.prescreens,['ResponseID','Submitted At','Cohort ID','Cohort Name','Child Full Name','Neurodivergent Response','Parent/Caretaker Name','Parent Email','Follow Up Needed']),consent:()=>simple('Consent Submissions',data.consents,['ResponseID','Submitted At','Child Full Name','Parent Full Name','Parent Email','Consent Status']),ready:()=>participantTable('Ready for DARTS',data.ready),followup:()=>participantTable('Manual Contact Queue',data.followups),matching,professor:()=>participantTable('Professor Review',data.needsReview),cohorts,reports,admin}[page]||dashboard)();setStatus()}
function content(h){document.getElementById('content').innerHTML=h}function cards(items){return `<div class="cards">${items.map(i=>`<div class="card"><small>${esc(i[0])}</small><strong>${esc(i[1]||0)}</strong><p class="status">${esc(i[2]||'')}</p></div>`).join('')}</div>`}
function dashboard(){const m=data.metrics;content(`<section class="hero"><h2>Enrollment Onboarding Command Center</h2><p>Workbook-powered review of prescreening, staff eligibility decisions, consent matching, manual contact, and DARTS readiness.</p></section>${cards([['Prescreened',m.prescreened,'Clean prescreening records'],['Pending Review',m.screeningPending,'Need staff decision'],['Approved Eligible',m.eligibleApproved,'Can receive consent link'],['Ineligible',m.ineligible,'Screened out by staff'],['Consent Submitted',m.consentSubmitted,'Consent records received'],['Ready for DARTS',m.readyForDarts,'Eligible and consent complete']])}<div class="grid2"><div class="panel"><h3>Action Items</h3><div class="body">${(data.reports.actionItems||[]).map(a=>`<p><strong>${esc(a.value)}</strong> ${esc(a.label)}</p>`).join('')||'<p class="empty">No action items.</p>'}</div></div><div class="panel"><h3>Recent Activity</h3><div class="body">${(data.activity||[]).map(a=>`<p><strong>${esc(a.type)}</strong> — ${esc(a.title)}<br><small>${esc(a.detail)} ${esc(a.when)}</small></p>`).join('')||'<p class="empty">No recent activity.</p>'}</div></div></div>`)}
function filters(){return `<div class="filters"><select id="fDecision" onchange="render()"><option value="">All eligibility</option><option>Pending Review</option><option>Approved Eligible</option><option>Not Eligible</option><option>Needs More Information</option></select><select id="fCohort" onchange="render()"><option value="">All cohorts</option>${[...new Set(data.participants.map(p=>p.cohortId||p.cohortName).filter(Boolean))].map(c=>`<option>${esc(c)}</option>`).join('')}</select><button class="btn success" onclick="batch('Approved Eligible')">Approve selected eligible</button><button class="btn danger" onclick="batch('Not Eligible')">Mark selected ineligible</button><button class="btn soft" onclick="batch('Needs More Information')">Needs more info</button></div>`}
function filter(rows){const q=(document.getElementById('search')?.value||'').toLowerCase(),fd=document.getElementById('fDecision')?.value||'',fc=document.getElementById('fCohort')?.value||'';return rows.filter(p=>{const hay=[p.childName,p.parentName,p.parentEmail,p.parentPhone,p.supportDetails,p.notes,p.cohortId,p.cohortName,p.humanEligibilityDecision].join(' ').toLowerCase();return(!q||hay.includes(q))&&(!fd||p.humanEligibilityDecision===fd)&&(!fc||p.cohortId===fc||p.cohortName===fc)})}
function screening(){participantTable('Screening Review',filter(data.participants),true)}
function participantTable(title,rows,selectable){content(`${selectable?filters():''}<div class="tablewrap"><table><thead><tr>${selectable?'<th><input type="checkbox" onchange="toggleAll(this.checked)"></th>':''}<th>Child</th><th>Parent</th><th>Cohort</th><th>Neurodivergent</th><th>System Suggestion</th><th>Human Decision</th><th>Contact</th><th>Consent / Match</th><th>Ready</th><th>Support Details</th><th></th></tr></thead><tbody>${rows.map(p=>`<tr>${selectable?`<td><input type="checkbox" ${selected.has(p.enrollmentId)?'checked':''} onchange="toggleOne('${attr(p.enrollmentId)}',this.checked)"></td>`:''}<td><strong>${esc(p.childName||p['Child Full Name'])}</strong><br><small>${esc(p.enrollmentId||p.EnrollmentID)}</small></td><td>${esc(p.parentName||p['Parent/Caretaker Name'])}<br><small>${esc(p.parentEmail||p['Parent Email'])}<br>${esc(p.parentPhone||p['Parent Phone'])}</small></td><td>${esc(p.cohortId||p['Cohort ID'])}<br><small>${esc(p.cohortName||p['Cohort Name'])}</small></td><td>${badge(p.neurodivergentResponse||p['Neurodivergent Response'])}</td><td>${badge(p.systemEligibilitySuggestion||p['System Eligibility Suggestion'])}</td><td>${badge(p.humanEligibilityDecision||p['Human Eligibility Decision'])}</td><td>${badge(p.manualContactStatus||p['Manual Contact Status']||p.followUpStatus)}</td><td>${badge(p.consentStatus)}<br>${badge(p.matchStatus)}</td><td>${badge(p.readyForDarts||p['Ready for DARTS'])}</td><td><div class="preview" title="${attr(p.supportDetails||p['Diagnostic/Support Details']||p['Support Details'])}">${esc(p.supportDetails||p['Diagnostic/Support Details']||p['Support Details'])}</div></td><td><button class="btn soft" onclick="openParticipant('${attr(p.enrollmentId||p.EnrollmentID)}')">Open</button></td></tr>`).join('')||`<tr><td class="empty" colspan="${selectable?11:10}">No records found.</td></tr>`}</tbody></table></div>`)}
function toggleOne(id,on){on?selected.add(id):selected.delete(id)}function toggleAll(on){filter(data.participants).forEach(p=>on?selected.add(p.enrollmentId):selected.delete(p.enrollmentId));render()}function batch(decision){if(!selected.size)return alert('Select at least one participant.');const reason=prompt('Decision reason / notes (optional):','Batch reviewed from dashboard.')||'';setStatus('Saving batch decision…');google.script.run.withSuccessHandler(d=>{data=normalize(d);selected.clear();render();setStatus('Batch decision saved.')}).withFailureHandler(e=>setStatus('Batch error: '+(e.message||e))).batchUpdateScreeningReview({enrollmentIds:[...selected],decision,reason})}
function openParticipant(id){const p=data.participants.find(x=>x.enrollmentId===id);if(!p)return;modal(p.childName,`<div class="formgrid"><div>${info('Enrollment ID',p.enrollmentId)}${info('Parent',p.parentName)}${info('Email',p.parentEmail)}${info('Phone',p.parentPhone)}${info('Cohort',`${p.cohortId||''} ${p.cohortName||''}`)}</div><div>${info('Neurodivergent',p.neurodivergentResponse)}${info('System Suggestion',p.systemEligibilitySuggestion)}${info('Consent',p.consentStatus)}${info('Match',`${p.matchStatus} ${p.matchConfidenceScore||0}%`)}</div></div><div class="field"><label>Original Support Details</label><textarea readonly>${esc(p.originalSupportDetails)}</textarea></div><div class="field"><label>System Reason</label><textarea readonly>${esc(p.systemEligibilityReason)}</textarea></div><div class="formgrid"><div class="field"><label>Human Eligibility Decision</label><select id="dec"><option>Pending Review</option><option>Approved Eligible</option><option>Not Eligible</option><option>Needs More Information</option></select></div><div class="field"><label>Manual Contact Status</label><select id="contact"><option>Not Needed</option><option>Not Started</option><option>Contacted</option><option>Parent Responded</option><option>Completed</option></select></div></div><div class="field"><label>Decision Reason</label><input id="reason" value="${attr(p.decisionReason)}"></div><div class="field"><label>Updated Support Details</label><textarea id="updated">${esc(p.updatedSupportDetails)}</textarea></div><div class="field"><label>Parent Response Summary</label><textarea id="summary">${esc(p.parentResponseSummary)}</textarea></div><div class="field"><label>Reviewer / PI Notes</label><textarea id="notes">${esc(p.notes||p.piNotes)}</textarea></div><button class="btn primary" onclick="saveParticipant('${attr(id)}')">Save Screening Review</button>`);setVal('dec',p.humanEligibilityDecision||'Pending Review');setVal('contact',p.manualContactStatus||'Not Needed')}
function saveParticipant(id){const decision=val('dec');setStatus('Saving screening review…');google.script.run.withSuccessHandler(d=>{data=normalize(d);closeModal();render();setStatus('Screening review saved.')}).withFailureHandler(e=>setStatus('Save error: '+(e.message||e))).updateScreeningReview({enrollmentId:id,'Human Eligibility Decision':decision,'Eligibility Review Status':decision==='Approved Eligible'?'Eligible':decision==='Not Eligible'?'Ineligible':decision==='Needs More Information'?'Needs More Information':'Pending Review','Manual Contact Needed':decision==='Needs More Information'?'Yes':'No','Manual Contact Status':val('contact'),'Decision Reason':val('reason'),'Updated Support Details':val('updated'),'Parent Response Summary':val('summary'),'Notes':val('notes')})}
function matching(){content(`<div class="grid2"><div class="panel"><h3>Match Review</h3><div class="body">${simpleTable(data.matchReview,['EnrollmentID','Child Full Name','Match Status','Match Confidence Score','Possible Consent Matches'])}</div></div><div class="panel"><h3>Unmatched Consent</h3><div class="body">${simpleTable(data.unmatchedConsents,['Consent ResponseID','Child Full Name','Best Prescreening Match','Best Match Score','Review Status'])}</div></div></div>`)}
function simple(title,rows,cols){content(`<div class="panel"><h3>${esc(title)}</h3><div class="body">${simpleTable(rows,cols)}</div></div>`)}function simpleTable(rows,cols){return `<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c])}</td>`).join('')}</tr>`).join('')||`<tr><td class="empty" colspan="${cols.length}">No records.</td></tr>`}</tbody></table></div>`}
function cohorts(){simple('Cohorts',data.cohorts,['cohortId','cohortName','site','programTerm','prescreened','consentSubmitted','masterRecords','readyForDarts'])}function reports(){content(`<div class="panel"><h3>Reports</h3><div class="body">${simpleTable(data.reports.actionItems||[],['label','value'])}</div></div>`)}function admin(){content(`<div class="panel"><h3>Webhook URLs</h3><div class="body"><p><strong>Prescreening:</strong><br>${esc(data.urls.prescreeningWebhook)}</p><p><strong>Consent:</strong><br>${esc(data.urls.consentWebhook)}</p><p class="status">Email automation and Power Automate bridge features are no longer active in this dashboard.</p></div></div>`)}
function info(k,v){return `<p><small>${esc(k)}</small><br><strong>${esc(v||'')}</strong></p>`}function val(id){return document.getElementById(id)?.value||''}function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v}function modal(t,b){document.getElementById('modalTitle').textContent=t||'';document.getElementById('modalBody').innerHTML=b||'';document.getElementById('modal').style.display='flex'}function closeModal(){document.getElementById('modal').style.display='none'}
render();
</script>
</body>
</html>
