<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --sidebar:#172033; --sidebar-2:#22314d; --top:#7b574b; --top-2:#6f4d43;
      --blue:#3159b7; --blue-2:#24448f; --sky:#0f8b9d; --green:#0f766e;
      --orange:#b45309; --red:#b42318; --purple:#6554c0; --ink:#1f2937;
      --muted:#667085; --line:#e4e7ec; --soft:#f6f7fb; --card:#ffffff;
      --cream:#fbf8f4; --shadow:0 16px 38px rgba(31,41,55,.10); --radius:16px;
      --font-body:Inter,Roboto,Helvetica,Arial,sans-serif; --font-heading:Montserrat,Inter,Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:#f6f7fb;color:var(--ink);font-family:var(--font-body);font-size:14px;line-height:1.45;letter-spacing:-.01em}
    .app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}
    .sidebar{background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));color:#eef2f7;position:sticky;top:0;height:100vh;overflow:auto;box-shadow:12px 0 30px rgba(23,32,51,.18);border-right:1px solid rgba(255,255,255,.08)}
    .brand{display:flex;align-items:center;gap:13px;padding:26px 22px;border-bottom:1px solid rgba(255,255,255,.10)}
    .logo{height:46px;width:46px;border-radius:15px;background:#ffffff;color:#22314d;display:grid;place-items:center;font-family:var(--font-heading);font-weight:800;letter-spacing:-.05em;box-shadow:0 14px 28px rgba(0,0,0,.18)}
    .brand h1{font-family:var(--font-heading);font-size:18px;margin:0;font-weight:800;letter-spacing:-.04em;color:#ffffff}.brand small{color:#cbd5e1;font-weight:600}
    .navgroup{padding:18px 14px}.navlabel{font-size:10.5px;letter-spacing:.17em;color:#9fb0c8;font-weight:800;margin:18px 8px 8px;text-transform:uppercase;font-family:var(--font-heading)}
    .navitem{width:100%;display:flex;align-items:center;gap:11px;border:0;background:transparent;color:#dbe4f0;padding:12px 14px;border-radius:10px;text-align:left;font-weight:700;cursor:pointer;transition:.16s ease;font-family:var(--font-body)}
    .navitem::before{content:'';width:6px;height:6px;border-radius:50%;background:#8fa3c2;opacity:.65}.navitem:hover{background:rgba(255,255,255,.09);color:white}.navitem.active{background:#ffffff;color:#22314d;box-shadow:0 10px 24px rgba(0,0,0,.16)}.navitem.active::before{background:var(--top)}
    .navitem .count{margin-left:auto;background:#eef2f7;color:#22314d;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:800}.userbox{margin:18px 14px;padding:14px;border-radius:14px;background:rgba(255,255,255,.09);display:flex;gap:10px;align-items:center}.avatar{width:36px;height:36px;border-radius:50%;background:#ffffff;color:#22314d;display:grid;place-items:center;font-weight:800}
    .main{min-width:0}.topbar{height:76px;background:#ffffff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 28px;position:sticky;top:0;z-index:4}.topbar h2{margin:0;font-family:var(--font-heading);font-size:24px;font-weight:800;letter-spacing:-.045em}.topbar .spacer{flex:1}.search{min-width:320px;border:1px solid #d0d5dd;border-radius:10px;padding:11px 14px;font:inherit;background:#fff}.search:focus{outline:2px solid #d6bbfb;border-color:#7b574b}.btn{border:0;border-radius:10px;padding:11px 15px;font-weight:800;cursor:pointer;font-family:var(--font-body)}.btn.primary{background:var(--blue);color:white}.btn.primary:hover{background:var(--blue-2)}.btn.soft{background:#eef2ff;color:#24448f}.btn.warn{background:#fff7ed;color:#9a3412}.btn.danger{background:#fee2e2;color:#991b1b}.status{font-size:13px;color:var(--muted)}
    main{padding:26px 28px}.hero{background:linear-gradient(135deg,var(--top),var(--top-2));border-radius:0 0 18px 18px;color:white;padding:28px 30px;display:grid;grid-template-columns:1.3fr .7fr;gap:18px;box-shadow:var(--shadow);margin:-26px -28px 24px}.hero h2{font-family:var(--font-heading);font-size:30px;margin:0 0 8px;font-weight:800;letter-spacing:-.045em}.hero p{margin:0;color:#fff7ed}.hero-actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.hero .btn{background:rgba(255,255,255,.16);color:white;border:1px solid rgba(255,255,255,.34)}
    .cohort-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:0 0 22px}.cohort-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:0 8px 20px rgba(31,41,55,.06)}.cohort-card strong{display:block;font-family:var(--font-heading);font-size:13px}.cohort-card small{color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:16px;margin-bottom:22px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.card .icon{width:42px;height:42px;border-radius:12px;background:#f2ede9;color:var(--top);display:grid;place-items:center;margin-bottom:12px;font-family:var(--font-heading);font-size:13px;font-weight:800}.metric-label{text-transform:uppercase;letter-spacing:.075em;font-size:11px;color:var(--muted);font-weight:800}.metric-value{font-family:var(--font-heading);font-size:30px;font-weight:800;margin-top:6px}.metric-note{font-size:12px;color:var(--muted);margin-top:4px}.accent-blue{border-top:4px solid var(--blue)}.accent-green{border-top:4px solid var(--green)}.accent-orange{border-top:4px solid var(--orange)}.accent-red{border-top:4px solid var(--red)}.accent-purple{border-top:4px solid var(--purple)}.accent-sky{border-top:4px solid var(--sky)}
    .grid-2{display:grid;grid-template-columns:2fr 1fr;gap:18px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.panel h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-family:var(--font-heading);font-size:16px;letter-spacing:-.02em}.panel-body{padding:18px}.funnel-row{display:grid;grid-template-columns:190px 1fr 58px;gap:12px;align-items:center;margin:12px 0}.bar{height:10px;background:#eaecf0;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--top),var(--blue));border-radius:99px}.split{display:flex;justify-content:space-between;gap:12px;align-items:center}.action{padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fcfcfd}.action strong{display:block}.timeline{max-height:430px;overflow:auto}.event{display:grid;grid-template-columns:34px 1fr;gap:10px;margin-bottom:14px}.event-dot{height:28px;width:28px;border-radius:50%;background:#f2ede9;color:var(--top);display:grid;place-items:center;font-size:13px}.event strong{display:block}.event small{color:var(--muted)}
    .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.toolbar select,.toolbar input{border:1px solid #d0d5dd;border-radius:10px;padding:10px 12px;font:inherit;background:white}.tablewrap{background:white;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top;font-size:13px}th{background:#f8fafc;color:#475467;font-size:11px;text-transform:uppercase;letter-spacing:.055em;position:sticky;top:0;font-weight:800}tr:hover{background:#f9fafb}.badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;white-space:nowrap}.b-green{background:#dcfce7;color:#166534}.b-blue{background:#dbeafe;color:#1d4ed8}.b-orange{background:#ffedd5;color:#9a3412}.b-red{background:#fee2e2;color:#991b1b}.b-purple{background:#ede9fe;color:#5b21b6}.b-gray{background:#f2f4f7;color:#475467}.preview{max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{background:white;border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-weight:800;cursor:pointer}.tab.active{background:var(--top);color:white;border-color:var(--top)}
    .kanban{display:grid;grid-template-columns:repeat(5,minmax(210px,1fr));gap:14px;overflow:auto}.lane{background:#f2f4f7;border-radius:14px;padding:12px;min-height:240px}.lane h4{margin:0 0 10px;font-family:var(--font-heading)}.person-card{background:white;border:1px solid var(--line);border-left:4px solid var(--top);border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 3px 8px rgba(31,41,55,.05)}.person-card strong{display:block}.person-card small{color:var(--muted)}
    .chart-list{display:grid;gap:12px}.chart-row{display:grid;grid-template-columns:160px 1fr 48px;gap:10px;align-items:center}.empty{padding:34px;text-align:center;color:var(--muted)}.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(31,41,55,.58);z-index:20;align-items:center;justify-content:center;padding:18px}.modal{background:white;border-radius:18px;box-shadow:0 25px 70px rgba(0,0,0,.35);width:min(980px,96vw);max-height:90vh;overflow:auto}.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}.modal-head h2{font-family:var(--font-heading)}.modal-body{padding:22px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid #d0d5dd;border-radius:10px;padding:10px;font:inherit}.field textarea{min-height:92px}.hidden{display:none!important}
    @media(max-width:1200px){.cards{grid-template-columns:repeat(3,1fr)}.grid-2,.hero{grid-template-columns:1fr}.hero-actions{justify-content:flex-start}.kanban{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:800px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.topbar{position:relative;height:auto;flex-wrap:wrap;padding:16px}.search{min-width:100%}.cards,.grid-3,.formgrid{grid-template-columns:1fr}.kanban{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">G4G</div><div><h1>G4G Research</h1><small>Enrollment Command Center</small></div></div>
    <div class="navgroup">
      <div class="navlabel">Overview</div>
      <button class="navitem active" data-page="dashboard" onclick="showPage('dashboard')">Dashboard</button>
      <button class="navitem" data-page="activity" onclick="showPage('activity')">Activity Feed</button>
      <div class="navlabel">Participants</div>
      <button class="navitem" data-page="participants" onclick="showPage('participants')">All Participants <span class="count" id="navParticipants">0</span></button>
      <button class="navitem" data-page="prescreening" onclick="showPage('prescreening')">Prescreening</button>
      <button class="navitem" data-page="consent" onclick="showPage('consent')">Consent</button>
      <button class="navitem" data-page="ready" onclick="showPage('ready')">Ready for DARTS</button>
      <button class="navitem" data-page="cohorts" onclick="showPage('cohorts')">Cohorts <span class="count" id="navCohorts">0</span></button>
      <div class="navlabel">Operations</div>
      <button class="navitem" data-page="followup" onclick="showPage('followup')">Follow-Up Queue <span class="count" id="navFollowup">0</span></button>
      <button class="navitem" data-page="email" onclick="showPage('email')">Email Center <span class="count" id="navEmail">0</span></button>
      <button class="navitem" data-page="matching" onclick="showPage('matching')">Matching Center <span class="count" id="navMatching">0</span></button>
      <button class="navitem" data-page="professor" onclick="showPage('professor')">Professor Review</button>
      <div class="navlabel">Reports & Admin</div>
      <button class="navitem" data-page="reports" onclick="showPage('reports')">Reports</button>
      <button class="navitem" data-page="admin" onclick="showPage('admin')">Admin / Webhooks</button>
    </div>
    <div class="userbox"><div class="avatar">PI</div><div><strong>Study Team</strong><br><small>Sheet-powered web app</small></div></div>
  </aside>

  <section class="main">
    <div class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <input class="search" id="globalSearch" placeholder="Search child, parent, email, notes…" oninput="renderPage()">
      <div class="spacer"></div>
      <span class="status" id="status">Loading…</span>
    </div>
    <main id="content"></main>
  </section>
</div>

<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal-head"><h2 id="modalTitle">Details</h2><button class="btn soft" onclick="closeModal()">Close</button></div><div class="modal-body" id="modalBody"></div></div></div>

<script>
window.__INITIAL_DASHBOARD_DATA__ = JSON.parse(atob('<?!= initialData ?>'));
let data = normalizeDashboardData(window.__INITIAL_DASHBOARD_DATA__);
let currentPage = 'dashboard';

function emptyData(){return {generatedAt:'',metrics:{},participants:[],followups:[],needsReview:[],ready:[],matchReview:[],unmatchedConsents:[],prescreens:[],consents:[],dashboardRows:[],activity:[],reports:{actionItems:[]},cohorts:[],emailTemplates:[],emailOutbox:[],emailLog:[],replyLog:[],reminderQueue:[],emailMetrics:{},urls:{},setup:{}};}
function normalizeDashboardData(payload){const base=emptyData();payload=payload&&typeof payload==='object'?payload:{};const merged=Object.assign(base,payload);['participants','followups','needsReview','ready','matchReview','unmatchedConsents','prescreens','consents','dashboardRows','activity','cohorts','emailTemplates','emailOutbox','emailLog','replyLog','reminderQueue'].forEach(k=>{if(!Array.isArray(merged[k]))merged[k]=[];});merged.metrics=merged.metrics||{};merged.emailMetrics=merged.emailMetrics||{};merged.reports=merged.reports||{actionItems:[]};merged.reports.actionItems=Array.isArray(merged.reports.actionItems)?merged.reports.actionItems:[];merged.urls=merged.urls||{};merged.setup=merged.setup||{};return merged;}
function describeError(e){if(!e)return 'Unknown error';return e.message||e.details||e.error||JSON.stringify(e);}
function loadData(){ setStatus('This dashboard is sheet-driven. Reopen the page to read the latest deployed spreadsheet snapshot.'); }
function showPage(page){currentPage=page;document.querySelectorAll('.navitem').forEach(b=>b.classList.toggle('active',b.dataset.page===page));document.getElementById('pageTitle').textContent=title(page);renderPage();}
function title(page){return {dashboard:'Dashboard',activity:'Activity Feed',participants:'All Participants',prescreening:'Prescreening Submissions',consent:'Consent Submissions',ready:'Ready for DARTS',cohorts:'Cohorts',followup:'Follow-Up Queue',email:'Email Center',matching:'Matching Center',professor:'Professor Review',reports:'Reports',admin:'Admin / Webhooks'}[page]||'Dashboard';}
function hydrateNav(){document.getElementById('navParticipants').textContent=(data.participants||[]).length;document.getElementById('navFollowup').textContent=(data.followups||[]).length;document.getElementById('navMatching').textContent=((data.matchReview||[]).length+(data.unmatchedConsents||[]).length);const c=document.getElementById('navCohorts');if(c)c.textContent=(data.cohorts||[]).length;const e=document.getElementById('navEmail');if(e)e.textContent=(data.emailOutbox||[]).filter(j=>j['Send Status']!=='Sent'&&j['Send Status']!=='Cancelled').length;}
function renderPage(){data=normalizeDashboardData(data);try{({dashboard:renderDashboard,activity:renderActivity,participants:()=>renderParticipantTable('All Participants', filtered(data.participants||[])),prescreening:renderPrescreening,consent:renderConsent,ready:()=>renderParticipantTable('Ready for DARTS', filtered(data.ready||[])),cohorts:renderCohorts,followup:renderFollowup,email:renderEmailCenter,matching:renderMatching,professor:renderProfessor,reports:renderReports,admin:renderAdmin}[currentPage]||renderDashboard)();}catch(e){console.error(e);content(`<div class="panel"><h3>Dashboard render error</h3><div class="panel-body"><p class="status">${esc(describeError(e))}</p></div></div>`);setStatus('Render error: '+describeError(e));}}

function renderDashboard(){
  const m=data.metrics||{};
  content(`<section class="hero"><div><h2>Enrollment Command Center</h2><p>Real-time workbook-powered view of prescreening, consent, follow-up, matching, professor review, and DARTS readiness.</p></div><div class="hero-actions"><button class="btn" onclick="showPage('followup')">Open Follow-Up</button><button class="btn" onclick="showPage('email')">Email Center</button><button class="btn" onclick="showPage('matching')">Resolve Matches</button><button class="btn" onclick="showPage('professor')">Professor View</button></div></section>${cohortStrip()}${cards([
    ['Prescreened',m.prescreened,'PS','accent-blue','Clean prescreening records'],['Consent Submitted',m.consentSubmitted,'CS','accent-green','Clean consent records'],['Master Records',m.masterRecords,'MR','accent-sky','Unique enrollment records'],['Follow-Up Needed',m.followUpNeeded,'FU','accent-orange','No-response clarification'],['Match Review',m.matchReviewNeeded,'MT','accent-purple','Ambiguous consent links'],['Ready for DARTS',m.readyForDarts,'RD','accent-green','Ready to export'],['Emails Pending',data.emailMetrics&&data.emailMetrics.pendingApproval,'EM','accent-purple','Awaiting approval']
  ])}<div class="grid-2"><div class="panel"><h3>Enrollment Funnel</h3><div class="panel-body">${funnel()}</div></div><div class="panel"><h3>Needs Attention</h3><div class="panel-body">${actionItems()}</div></div></div><div class="grid-2" style="margin-top:18px"><div class="panel"><h3>Recent Activity</h3><div class="panel-body timeline">${activityList(data.activity||[])}</div></div><div class="panel"><h3>Status Distribution</h3><div class="panel-body">${chartList(data.reports&&data.reports.followupStatus,'Follow-up')}</div></div></div>`);
}

function cohortStrip(){const cohorts=(data.cohorts||[]).filter(c=>c.cohortId!=='Unassigned').slice(0,4);return cohorts.length?`<div class="cohort-strip">${cohorts.map(c=>`<div class="cohort-card"><strong>${esc(c.cohortName||c.cohortId)}</strong><small>${esc(c.site||'No site')} • ${esc(c.programTerm||'No term')}</small><div class="split" style="margin-top:10px"><span>${c.prescreened||0} prescreened</span><span>${c.masterRecords||0} master</span><span>${c.readyForDarts||0} ready</span></div></div>`).join('')}</div>`:'';}
function renderCohorts(){content(`<div class="panel"><h3>Cohort Tracker</h3><div class="panel-body"><p class="status">Prescreening webhooks can include cohort_id, cohort_name, site, and program_term. Consent records inherit cohort through matching unless a consent URL also includes cohort metadata.</p>${cohortTable()}</div></div>`);}
function cohortTable(){const rows=data.cohorts||[];return `<div class="tablewrap"><table><thead><tr><th>Cohort</th><th>Site / Term</th><th>Status</th><th>Prescreened</th><th>Consent submitted</th><th>Master</th><th>Follow-up</th><th>Ready</th></tr></thead><tbody>${rows.map(c=>`<tr><td><strong>${esc(c.cohortId)}</strong><br><small>${esc(c.cohortName)}</small></td><td>${esc(c.site)}<br><small>${esc(c.programTerm)}</small></td><td>${badge(c.status||'Active')}</td><td>${esc(c.prescreened||0)}</td><td>${esc(c.consentSubmitted||0)}</td><td>${esc(c.masterRecords||0)}</td><td>${esc(c.followUpNeeded||0)}</td><td>${esc(c.readyForDarts||0)}</td></tr>`).join('')||rowEmpty(8,'cohorts')}</tbody></table></div>`;}

function cards(items){return `<div class="cards">${items.map(([label,value,icon,accent,note])=>`<div class="card ${accent}"><div class="icon">${icon}</div><div class="metric-label">${label}</div><div class="metric-value">${value||0}</div><div class="metric-note">${note||''}</div></div>`).join('')}</div>`;}
function funnel(){const m=data.metrics||{};const rows=[['Prescreened',m.prescreened],['Consent submitted',m.consentSubmitted],['Consent completed',m.consentCompleted],['Follow-up completed',m.followUpCompleted],['Consent matched / master',m.masterRecords],['Ready for DARTS',m.readyForDarts]];const max=Math.max(1,...rows.map(r=>Number(r[1]||0)));return rows.map(([label,value])=>`<div class="funnel-row"><strong>${label}</strong><div class="bar"><span style="width:${Math.round((value||0)/max*100)}%"></span></div><strong>${value||0}</strong></div>`).join('');}
function actionItems(){const items=(data.reports&&data.reports.actionItems)||[];return items.map(i=>`<div class="action split"><div><strong>${esc(i.label)}</strong><small>${i.value? 'Needs attention':'No current action'}</small></div><span class="badge ${i.value?'b-orange':'b-green'}">${i.value}</span></div>`).join('')||empty('No action items.');}
function activityList(items){return items.map(i=>`<div class="event"><div class="event-dot">${iconFor(i.type)}</div><div><strong>${esc(i.title)}</strong><small>${esc(i.type)} • ${esc(i.detail)} • ${formatDate(i.when)}</small></div></div>`).join('')||empty('No recent activity.');}
function iconFor(t){return /consent/i.test(t)?'✓':/follow/i.test(t)?'✉':/match/i.test(t)?'↔':'•'}

function renderParticipantTable(label, rows){content(`<div class="toolbar"><select id="filterFollow" onchange="renderPage()"><option value="">All follow-up</option>${options(unique((data.participants||[]).map(p=>p.followUpStatus)))}</select><select id="filterConsent" onchange="renderPage()"><option value="">All consent</option>${options(unique((data.participants||[]).map(p=>p.consentStatus)))}</select><select id="filterReady" onchange="renderPage()"><option value="">All readiness</option><option>Yes</option><option>No</option><option>Review</option></select><select id="filterCohort" onchange="renderPage()"><option value="">All cohorts</option>${options(unique((data.participants||[]).map(p=>p.cohortId||p.cohortName)))}</select></div><div class="tablewrap"><table><thead><tr><th>Child</th><th>Parent</th><th>Cohort</th><th>Neurodivergent</th><th>Follow-Up</th><th>Consent</th><th>Match</th><th>Ready</th><th>Support Details</th><th>Review</th><th></th></tr></thead><tbody>${rows.map(participantRow).join('')||rowEmpty(11,label)}</tbody></table></div>`);}
function participantRow(p){return `<tr><td><strong>${esc(p.childName)}</strong><br><small>${esc(p.enrollmentId)}</small></td><td>${esc(p.parentName)}<br><small>${esc(p.parentEmail)}<br>${esc(p.parentPhone)}</small></td><td><strong>${esc(p.cohortId||'Unassigned')}</strong><br><small>${esc(p.cohortName||'')} ${esc(p.site||'')}</small></td><td>${badge(p.neurodivergentResponse)}</td><td>${badge(p.followUpNeeded==='Yes'?p.followUpStatus||'Needed':'Not Needed')}</td><td>${badge(p.consentStatus)}</td><td>${badge(p.matchStatus||'No Consent Yet')}<br><small>${esc(p.matchConfidenceScore||0)}%</small></td><td>${badge(p.readyForDarts)}</td><td><div class="preview" title="${attr(p.supportDetails)}">${esc(p.supportDetails)}</div></td><td>${badge(p.eligibilityReviewStatus)}</td><td><button class="btn soft" onclick="openParticipant('${attr(p.enrollmentId)}')">Open</button></td></tr>`;}
function filtered(rows){const q=(document.getElementById('globalSearch')?.value||'').toLowerCase();const ff=document.getElementById('filterFollow')?.value||'';const fc=document.getElementById('filterConsent')?.value||'';const fr=document.getElementById('filterReady')?.value||'';const fco=document.getElementById('filterCohort')?.value||'';return rows.filter(p=>{const hay=[p.childName,p.parentName,p.parentEmail,p.parentPhone,p.conditions,p.supportDetails,p.matchReasons,p.eligibilityReviewStatus,p.cohortId,p.cohortName,p.site,p.programTerm].join(' ').toLowerCase();return(!q||hay.includes(q))&&(!ff||p.followUpStatus===ff)&&(!fc||p.consentStatus===fc)&&(!fr||p.readyForDarts===fr)&&(!fco||p.cohortId===fco||p.cohortName===fco);});}

function renderFollowup(){content(`<div class="tabs"><button class="tab active">Board</button><button class="tab" onclick="renderParticipantTable('Follow-Up Queue', filtered(data.followups||[]))">Table</button></div>${kanban()}`);}
function kanban(){const statuses=['Not Started','Email Drafted','Email Sent','Awaiting Response','Completed'];return `<div class="kanban">${statuses.map(status=>`<div class="lane"><h4>${status}</h4>${(data.followups||[]).filter(p=>(p.followUpStatus||'Not Started')===status).map(p=>`<div class="person-card"><strong>${esc(p.childName)}</strong><small>${esc(p.parentName)} • ${esc(p.parentEmail)}</small><p class="preview">${esc(p.supportDetails)}</p><button class="btn soft" onclick="openParticipant('${attr(p.enrollmentId)}')">Open</button></div>`).join('')||'<small>No records</small>'}</div>`).join('')}</div>`;}


function renderEmailCenter(){const em=data.emailMetrics||{};content(`${cards([['Drafts',em.drafts,'DR','accent-blue','Saved email drafts'],['Pending Approval',em.pendingApproval,'AP','accent-orange','Admin review required'],['Ready / Scheduled',(em.readyToSend||0)+(em.scheduled||0),'RS','accent-purple','Power Automate eligible'],['Sent',em.sent,'SN','accent-green','Delivered by Outlook'],['Failed',em.failed,'FL','accent-red','Needs troubleshooting'],['Replies',em.repliesReceived,'RP','accent-sky','Parent responses']])}<div class="tabs"><button class="tab active">Outbox</button><button class="tab" onclick="emailReplyView()">Replies</button><button class="tab" onclick="emailTemplateView()">Templates</button><button class="tab" onclick="emailPowerAutomateView()">Power Automate</button></div>${emailOutboxTable()}`);}
function emailOutboxTable(){const rows=data.emailOutbox||[];return `<div class="tablewrap"><table><thead><tr><th>Job</th><th>Parent</th><th>Email</th><th>Approval</th><th>Send</th><th>Scheduled</th><th>Sent</th><th>Error</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${esc(r['Child Full Name'])}</strong><br><small>${esc(r['EmailJobID'])}<br>${esc(r['Email Type'])}</small></td><td>${esc(r['Parent/Caretaker Name'])}<br><small>${esc(r['EnrollmentID'])}</small></td><td><strong>${esc(r['Email Subject'])}</strong><div class="preview" title="${attr(r['Email Body'])}">${esc(r['Email Body'])}</div></td><td>${badge(r['Approval Status'])}</td><td>${badge(r['Send Status'])}</td><td>${formatDate(r['Scheduled Send At'])}</td><td>${formatDate(r['Sent At'])}</td><td><div class="preview" title="${attr(r['Error Message'])}">${esc(r['Error Message'])}</div></td><td><button class="btn soft" onclick="openEmailJob('${attr(r['EmailJobID'])}')">Open</button></td></tr>`).join('')||rowEmpty(9,'email outbox')}</tbody></table></div>`;}
function emailReplyView(){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===1));content(`<div class="tabs"><button class="tab" onclick="renderEmailCenter()">Outbox</button><button class="tab active">Replies</button><button class="tab" onclick="emailTemplateView()">Templates</button><button class="tab" onclick="emailPowerAutomateView()">Power Automate</button></div><div class="tablewrap"><table><thead><tr><th>Received</th><th>Parent</th><th>Subject</th><th>Preview</th><th>Status</th></tr></thead><tbody>${(data.replyLog||[]).map(r=>`<tr><td>${formatDate(r['Received At'])}</td><td>${esc(r['From Name'])}<br><small>${esc(r['From Address'])}</small></td><td>${esc(r['Subject'])}<br><small>${esc(r['EnrollmentID'])}</small></td><td><div class="preview" title="${attr(r['Reply Body'])}">${esc(r['Reply Preview'])}</div></td><td>${badge(r['Follow Up Status After Reply']||'Reply Received')}</td></tr>`).join('')||rowEmpty(5,'reply')}</tbody></table></div>`);}
function emailTemplateView(){content(`<div class="tabs"><button class="tab" onclick="renderEmailCenter()">Outbox</button><button class="tab" onclick="emailReplyView()">Replies</button><button class="tab active">Templates</button><button class="tab" onclick="emailPowerAutomateView()">Power Automate</button></div><div class="tablewrap"><table><thead><tr><th>Template</th><th>Type</th><th>Subject</th><th>Active</th><th>Approval</th><th>Notes</th></tr></thead><tbody>${(data.emailTemplates||[]).map(t=>`<tr><td><strong>${esc(t['Template Name'])}</strong><br><small>${esc(t['TemplateID'])}</small></td><td>${esc(t['Email Type'])}</td><td>${esc(t['Subject Template'])}</td><td>${badge(t['Active'])}</td><td>${badge(t['Requires Approval'])}</td><td>${esc(t['Notes'])}</td></tr>`).join('')||rowEmpty(6,'template')}</tbody></table></div>`);}
function emailPowerAutomateView(){content(`<div class="tabs"><button class="tab" onclick="renderEmailCenter()">Outbox</button><button class="tab" onclick="emailReplyView()">Replies</button><button class="tab" onclick="emailTemplateView()">Templates</button><button class="tab active">Power Automate</button></div><div class="grid-2"><div class="panel"><h3>Recommended send-flow filter</h3><div class="panel-body"><p>Power Automate should send only rows from <strong>Email_Outbox</strong> where:</p><ul><li>Approval Status = Approved</li><li>Send Status = Ready To Send or Scheduled and due</li><li>Sent At is blank</li><li>Do Not Send is not Yes</li></ul><p class="status">Power Automate can GET approved jobs with action=email_jobs&secret=... and should POST back with action=email_status, emailJobId, status, sentAt, and runId after each attempt.</p></div></div><div class="panel"><h3>Reply tracking</h3><div class="panel-body"><p>Monitor Outlook replies containing the EmailJobID reference. POST replies back with action=email_reply so Apps Script can update Reply_Log and Followup_Queue.</p></div></div></div>`);}
function openEmailDraft(enrollmentId){const template=(data.emailTemplates||[])[0]||{};setStatus('Building email preview…');google.script.run.withSuccessHandler(d=>{modal('Create Follow-Up Email',`<div class="formgrid"><div class="field"><label>To</label><input readonly value="${attr(d.context.parentEmail)}"></div><div class="field"><label>Template</label><input readonly value="${attr(d.templateId)}"></div></div><div class="field"><label>Subject</label><input id="emailSubject" value="${attr(d.subject)}"></div><div class="field"><label>Body</label><textarea id="emailBody" style="min-height:260px">${esc(d.body)}</textarea></div><div class="formgrid"><div class="field"><label>Schedule send at (optional)</label><input id="emailSchedule" placeholder="YYYY-MM-DD HH:MM"></div><div class="field"><label>Notes</label><input id="emailNotes" value="Admin-reviewed draft."></div></div><button class="btn primary" onclick="saveDraft('${attr(enrollmentId)}','${attr(d.templateId)}')">Save Draft</button>`);setStatus('Email preview ready.');}).withFailureHandler(e=>setStatus('Preview error: '+describeError(e))).previewFollowupEmail({enrollmentId,templateId:template.TemplateID||template['TemplateID']});}
function saveDraft(enrollmentId,templateId){setStatus('Saving email draft…');const request={enrollmentId,templateId,subject:val('emailSubject'),body:val('emailBody'),scheduledSendAt:val('emailSchedule'),notes:val('emailNotes')};google.script.run.withSuccessHandler(payload=>{data=normalizeDashboardData(payload);closeModal();hydrateNav();showPage('email');setStatus('Draft saved.');}).withFailureHandler(e=>{console.error(e);setStatus('Draft error: '+describeError(e));}).saveEmailDraft(request);}
function openEmailJob(emailJobId){const job=(data.emailOutbox||[]).find(j=>j.EmailJobID===emailJobId||j['EmailJobID']===emailJobId);if(!job)return;modal('Email Job',`<div class="formgrid">${info('EmailJobID',job['EmailJobID'])}${info('EnrollmentID',job['EnrollmentID'])}${info('Parent Email',job['Parent Email'])}${info('Status',`${job['Approval Status']} / ${job['Send Status']}`)}</div><div class="field"><label>Subject</label><input id="jobSubject" value="${attr(job['Email Subject'])}"></div><div class="field"><label>Body</label><textarea id="jobBody" style="min-height:240px">${esc(job['Email Body'])}</textarea></div><div class="field"><label>Schedule Send At</label><input id="jobSchedule" value="${attr(job['Scheduled Send At'])}"></div><button class="btn primary" onclick="approveEmail('${attr(job['EmailJobID'])}')">Approve for Outlook Send</button> <button class="btn danger" onclick="cancelEmail('${attr(job['EmailJobID'])}')">Cancel</button>`);}
function approveEmail(emailJobId){setStatus('Approving email…');google.script.run.withSuccessHandler(payload=>{data=normalizeDashboardData(payload);closeModal();hydrateNav();showPage('email');setStatus('Email approved for Power Automate.');}).withFailureHandler(e=>setStatus('Approval error: '+describeError(e))).approveEmailForSending({emailJobId,scheduledSendAt:val('jobSchedule')});}
function cancelEmail(emailJobId){setStatus('Cancelling email…');google.script.run.withSuccessHandler(payload=>{data=normalizeDashboardData(payload);closeModal();hydrateNav();showPage('email');setStatus('Email cancelled.');}).withFailureHandler(e=>setStatus('Cancel error: '+describeError(e))).cancelEmailJob({emailJobId,reason:'Cancelled from dashboard'});}

function renderMatching(){content(`<div class="grid-2"><div class="panel"><h3>Match Review</h3><div class="panel-body">${matchReviewTable()}</div></div><div class="panel"><h3>Unmatched Consent</h3><div class="panel-body">${unmatchedTable()}</div></div></div>`);}
function matchReviewTable(){const rows=data.matchReview||[];return `<div class="tablewrap"><table><thead><tr><th>Participant</th><th>Status</th><th>Score</th><th>Possible Consent Matches</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${esc(r['Child Full Name'])}</strong><br><small>${esc(r['EnrollmentID'])}</small></td><td>${badge(r['Match Status'])}</td><td>${esc(r['Match Confidence Score'])}</td><td><div class="preview" title="${attr(r['Possible Consent Matches'])}">${esc(r['Possible Consent Matches'])}</div></td><td><button class="btn primary" onclick="openMatch('${attr(r['EnrollmentID'])}','')">Approve</button></td></tr>`).join('')||rowEmpty(5,'match review')}</tbody></table></div>`;}
function unmatchedTable(){const rows=data.unmatchedConsents||[];return `<div class="tablewrap"><table><thead><tr><th>Consent</th><th>Best Match</th><th>Score</th><th>Reasons</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${esc(r['Child Full Name'])}</strong><br><small>${esc(r['Consent ResponseID'])}<br>${esc(r['Parent Email'])}</small></td><td><div class="preview" title="${attr(r['Best Prescreening Match'])}">${esc(r['Best Prescreening Match'])}</div></td><td>${esc(r['Best Match Score'])}</td><td><div class="preview" title="${attr(r['Match Reasons'])}">${esc(r['Match Reasons'])}</div></td><td><button class="btn primary" onclick="openMatch('', '${attr(r['Consent ResponseID'])}')">Approve</button></td></tr>`).join('')||rowEmpty(5,'unmatched consent')}</tbody></table></div>`;}

function renderProfessor(){const m=data.metrics||{};content(`${cards([['Prescreened',m.prescreened,'PS','accent-blue'],['Consented',m.consentCompleted,'CS','accent-green'],['No-Response Follow-Up',m.followUpNeeded,'FU','accent-orange'],['Needs PI Review',m.needsReview,'PI','accent-purple'],['Ready for DARTS',m.readyForDarts,'RD','accent-green'],['Unmatched Consent',m.unmatchedConsent,'UC','accent-red']])}<div class="grid-2"><div class="panel"><h3>Professor Review Queue</h3><div class="panel-body">${reviewList()}</div></div><div class="panel"><h3>Enrollment Funnel</h3><div class="panel-body">${funnel()}</div></div></div>`);}
function reviewList(){return `<div class="tablewrap"><table><thead><tr><th>Child</th><th>Reason</th><th>Consent</th><th>Ready</th><th></th></tr></thead><tbody>${(data.needsReview||[]).map(p=>`<tr><td>${esc(p.childName)}<br><small>${esc(p.parentEmail)}</small></td><td>${badge(p.eligibilityReviewStatus)} ${badge(p.matchStatus)}</td><td>${badge(p.consentStatus)}</td><td>${badge(p.readyForDarts)}</td><td><button class="btn soft" onclick="openParticipant('${attr(p.enrollmentId)}')">Review</button></td></tr>`).join('')||rowEmpty(5,'professor review')}</tbody></table></div>`;}
function renderPrescreening(){simpleSheet('Prescreening Submissions',data.prescreens||[],['ResponseID','Submitted At','Cohort ID','Cohort Name','Child Full Name','Neurodivergent Response','Parent/Caretaker Name','Parent Email','Follow Up Needed']);}
function renderConsent(){simpleSheet('Consent Submissions',data.consents||[],['ResponseID','Submitted At','Cohort ID','Cohort Name','Child Full Name','Parent Full Name','Parent Email','Consent Status']);}
function simpleSheet(label,rows,cols){content(`<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c])}</td>`).join('')}</tr>`).join('')||rowEmpty(cols.length,label)}</tbody></table></div>`);}
function renderActivity(){content(`<div class="panel"><h3>Workbook Activity Feed</h3><div class="panel-body timeline">${activityList(data.activity||[])}</div></div>`);}
function renderReports(){content(`<div class="grid-3"><div class="panel"><h3>Follow-Up Status</h3><div class="panel-body">${chartList(data.reports&&data.reports.followupStatus)}</div></div><div class="panel"><h3>Consent Status</h3><div class="panel-body">${chartList(data.reports&&data.reports.consentStatus)}</div></div><div class="panel"><h3>Match Status</h3><div class="panel-body">${chartList(data.reports&&data.reports.matchStatus)}</div></div></div><div class="panel" style="margin-top:18px"><h3>Spreadsheet Dashboard Metrics</h3><div class="panel-body">${metricRows()}</div></div>`);}
function metricRows(){return `<div class="tablewrap"><table><thead><tr><th>Metric</th><th>Value</th><th>Interpretation</th></tr></thead><tbody>${(data.dashboardRows||[]).map(r=>`<tr><td>${esc(r.metric)}</td><td><strong>${esc(r.value)}</strong></td><td>${esc(r.interpretation)}</td></tr>`).join('')||rowEmpty(3,'dashboard metrics')}</tbody></table></div>`;}
function renderAdmin(){content(`<div class="grid-2"><div class="panel"><h3>Webhook URLs</h3><div class="panel-body"><div class="field"><label>Prescreening webhook</label><input readonly value="${attr(data.urls&&data.urls.prescreeningWebhook)}"></div><div class="field"><label>Consent webhook</label><input readonly value="${attr(data.urls&&data.urls.consentWebhook)}"></div><div class="field"><label>Example cohort prescreening webhook</label><input readonly value="${attr((data.urls&&data.urls.prescreeningWebhook||'')+'&cohort_id=COHORT-01&cohort_name=Cohort%201&site=UGA&program_term=Summer%202026')}"></div><p class="status">This web app is read-only for workbook rebuilding. To rebuild processed tabs from raw QuestionPro rows, open the Google Sheet and use <strong>G4G Tracker → Refresh tracker from raw tabs</strong>.</p></div></div><div class="panel"><h3>Setup Status</h3><div class="panel-body"><pre>${esc(JSON.stringify(data.setup||{},null,2))}</pre></div></div></div>`);}

function openParticipant(id){const p=(data.participants||[]).find(x=>x.enrollmentId===id);if(!p)return;modal(p.childName||'Participant',`<div class="formgrid">${info('Enrollment ID',p.enrollmentId)}${info('Parent',p.parentName)}${info('Email',p.parentEmail)}${info('Phone',p.parentPhone)}${info('Cohort',`${p.cohortId||'Unassigned'} ${p.cohortName||''} ${p.site||''}`)}${info('Neurodivergent',p.neurodivergentResponse)}${info('Conditions',p.conditions)}${info('Follow-Up',p.followUpStatus)}${info('Consent',p.consentStatus)}${info('Match',`${p.matchStatus||''} ${p.matchConfidenceScore||0}%`)}${info('Ready',p.readyForDarts)}</div><div class="field"><label>Original Support Details</label><textarea readonly>${esc(p.originalSupportDetails)}</textarea></div><div class="formgrid"><div class="field"><label>Follow Up Status</label><select id="editFollowStatus">${options(['Not Started','Email Drafted','Email Sent','Awaiting Response','Completed','Not Needed','Unresolved'])}</select></div><div class="field"><label>Eligibility Review Status</label><select id="editReview">${options(['Not Reviewed','Likely Eligible','No-Response Follow-Up','Needs Review','Needs PI Review','Not Eligible','Ready'])}</select></div><div class="field"><label>Assigned To</label><input id="editAssigned" value="${attr(p.assignedTo)}"></div><div class="field"><label>Follow-Up Outcome</label><input id="editOutcome" value="${attr(p.followUpOutcome)}"></div></div><div class="field"><label>Updated Support Details</label><textarea id="editUpdated">${esc(p.updatedSupportDetails)}</textarea></div><div class="field"><label>Internal Notes</label><textarea id="editNotes">${esc(p.notes)}</textarea></div><div class="field"><label>PI Notes</label><textarea id="editPiNotes">${esc(p.piNotes)}</textarea></div><button class="btn primary" onclick="saveParticipant('${attr(p.enrollmentId)}')">Save Review</button> <button class="btn soft" onclick="openEmailDraft('${attr(p.enrollmentId)}')">Preview Follow-Up Email</button>`);setValue('editFollowStatus',p.followUpStatus||'Not Started');setValue('editReview',p.eligibilityReviewStatus||'Not Reviewed');}
function saveParticipant(id){const updates={enrollmentId:id,'Follow Up Status':val('editFollowStatus'),'Assigned To':val('editAssigned'),'Updated Support Details':val('editUpdated'),'Follow-Up Outcome':val('editOutcome'),'Eligibility Review Status':val('editReview'),'Notes':val('editNotes'),'PI Notes':val('editPiNotes')};setStatus('Saving review…');google.script.run.withSuccessHandler(payload=>{data=normalizeDashboardData(payload);closeModal();hydrateNav();renderPage();setStatus('Saved: '+formatDate(new Date()));}).withFailureHandler(e=>setStatus('Save error: '+describeError(e))).updateFollowupReview(updates);}
function openMatch(enrollmentId, consentResponseId){modal('Approve Consent Match',`<div class="formgrid"><div class="field"><label>EnrollmentID / Master record</label><select id="matchEnrollment"><option value="">Select participant…</option>${(data.participants||[]).map(p=>`<option value="${attr(p.enrollmentId)}">${esc(p.childName)} — ${esc(p.parentEmail)} — ${esc(p.enrollmentId)}</option>`).join('')}</select></div><div class="field"><label>Consent ResponseID</label><select id="matchConsent"><option value="">Select consent…</option>${(data.consents||[]).map(c=>`<option value="${attr(c.ResponseID)}">${esc(c['Child Full Name'])} — ${esc(c['Parent Email'])} — ${esc(c.ResponseID)}</option>`).join('')}</select></div></div><div class="field"><label>Manual Match Notes</label><textarea id="matchNotes">Approved from Matching Center.</textarea></div><button class="btn primary" onclick="approveMatch()">Approve and Refresh</button>`);setValue('matchEnrollment',enrollmentId);setValue('matchConsent',consentResponseId);}
function approveMatch(){setStatus('Approving match…');google.script.run.withSuccessHandler(payload=>{data=normalizeDashboardData(payload);closeModal();hydrateNav();showPage('matching');setStatus('Match approved: '+formatDate(new Date()));}).withFailureHandler(e=>setStatus('Match error: '+describeError(e))).approveConsentMatch({enrollmentId:val('matchEnrollment'),consentResponseId:val('matchConsent'),notes:val('matchNotes')});}

function chartList(obj){obj=obj||{};const entries=Object.entries(obj);const max=Math.max(1,...entries.map(e=>e[1]));return `<div class="chart-list">${entries.map(([k,v])=>`<div class="chart-row"><strong>${esc(k)}</strong><div class="bar"><span style="width:${Math.round(v/max*100)}%"></span></div><strong>${v}</strong></div>`).join('')||empty('No data')}</div>`;}
function badge(v){v=String(v||'Missing');let cls=/yes|complete|ready|matched|manual/i.test(v)?'b-green':/review|needed|probable|awaiting/i.test(v)?'b-orange':/missing|unmatched|declined|error/i.test(v)?'b-red':/pending|progress|drafted|sent/i.test(v)?'b-blue':'b-gray';return `<span class="badge ${cls}">${esc(v)}</span>`;}
function modal(title,html){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBackdrop').style.display='flex';}
function closeModal(){document.getElementById('modalBackdrop').style.display='none';}
function info(label,value){return `<div class="field"><label>${esc(label)}</label><div>${esc(value||'')}</div></div>`;}
function content(html){document.getElementById('content').innerHTML=html;}
function options(values){return (values||[]).filter(Boolean).map(v=>`<option>${esc(v)}</option>`).join('');}
function unique(v){return [...new Set((v||[]).filter(Boolean))].sort();}
function rowEmpty(cols,label){return `<tr><td colspan="${cols}" class="empty">No ${esc(label)} records found.</td></tr>`;}
function empty(msg){return `<div class="empty">${esc(msg)}</div>`;}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function attr(v){return esc(v).replace(/`/g,'&#96;');}
function val(id){return document.getElementById(id)?.value||'';} function setValue(id,v){const el=document.getElementById(id);if(el)el.value=v||'';}
function formatDate(v){if(!v)return 'Not available';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleString();}
function setStatus(t){document.getElementById('status').textContent=t;}
if(data&&data.generatedAt){hydrateNav();renderPage();setStatus('Loaded from spreadsheet: '+formatDate(data.generatedAt));}else{setStatus('Dashboard data was not available. Reopen this page after checking Apps Script deployment permissions.');}
</script>
</body>
</html>
