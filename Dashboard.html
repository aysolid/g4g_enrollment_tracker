    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);font-size:15px;line-height:1.45}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,var(--nav),var(--nav2));color:#dbe7f6;padding:24px 18px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:28px}.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#3766d8,#36b7ad);display:grid;place-items:center;font-weight:800;color:#fff}.brand h1{font-size:18px;margin:0;color:#fff;font-weight:700}.brand p{margin:2px 0 0;color:#b5c6df;font-size:12px}.section{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#aebbd5;font-weight:700;margin:24px 0 8px}.nav{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;background:transparent;color:#e6edf7;border:0;border-radius:12px;padding:11px 14px;text-align:left;cursor:pointer;font-weight:500}.nav.active,.nav:hover{background:#fff;color:#172033}.count{background:rgba(255,255,255,.16);color:#fff;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:700}.nav.active .count{background:#e8edf5;color:#26374f}.main{min-width:0}.top{min-height:76px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px 28px;position:sticky;top:0;z-index:5}.title{display:flex;align-items:center;gap:18px;flex-wrap:wrap}.title h2{margin:0;font-size:25px;font-weight:700}.search{width:360px;max-width:34vw;border:1px solid var(--line);border-radius:12px;padding:12px 14px}.toptools{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}.cohortSelect{min-width:240px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff}.status{font-size:12px;color:var(--muted)}.content{padding:28px}.hero{border-radius:24px;background:linear-gradient(135deg,#fff,#f2f7ff);padding:28px;border:1px solid #dbe8f8;box-shadow:var(--shadow);margin-bottom:22px}.hero h2{font-size:30px;margin:0 0 8px;font-weight:800}.hero p{color:var(--muted);margin:0}.cards{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:16px;margin:18px 0}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.card small{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700}.card strong{display:block;font-size:30px;margin-top:10px}.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}.panel h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-size:18px}.body{padding:18px}.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}.filters select,.filters button{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}.primary{background:var(--blue);color:#fff}.soft{background:var(--soft-blue);color:var(--blue-text)}.danger{background:var(--soft-red);color:var(--red-text)}.success{background:var(--soft-green);color:var(--green-text)}.tablewrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:var(--radius)}table{border-collapse:collapse;width:100%;min-width:1050px}th,td{border-bottom:1px solid #edf2f7;padding:14px 15px;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc;text-transform:uppercase;letter-spacing:.07em;font-size:11px;color:#475569;font-weight:700}.name{font-weight:700}.small{font-size:12px;color:#334155}.badge{display:inline-block;border-radius:999px;padding:5px 11px;font-weight:700;font-size:12px;background:var(--soft-gray);color:#475569}.yes,.eligible{background:var(--soft-green);color:var(--green-text)}.no,.ineligible{background:var(--soft-red);color:var(--red-text)}.warn,.review{background:var(--soft-amber);color:var(--amber-text)}.blue{background:var(--soft-blue);color:var(--blue-text)}.preview{max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.grid2{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:20;display:none;align-items:center;justify-content:center;padding:24px}.modalbox{background:#fff;border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.25);max-width:1040px;width:min(1040px,96vw);max-height:90vh;overflow:auto}.modalhead{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line)}.modalbody{padding:24px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:12px}.field label{display:block;font-weight:700;color:#475569;font-size:12px;margin-bottom:6px}input,select,textarea{border:1px solid var(--line);border-radius:10px;padding:10px;width:100%}textarea{min-height:90px}.empty{text-align:center;color:var(--muted);padding:28px}@media(max-width:1000px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.cards,.grid2,.formgrid{grid-template-columns:1fr}.search{max-width:none;width:100%}.top{align-items:flex-start;flex-direction:column}.cohortSelect{width:100%}}

<? var encoded = initialData || ''; ?>
<script>window.__INITIAL_DATA__='<?= encoded ?>';</script>
<div class="app"><aside class="side"><div class="brand"><div class="logo">G4G</div><div><h1>G4G Research</h1><p>Enrollment command center</p></div></div><div id="nav"></div></aside><main class="main"><div class="top"><div class="title"><h2 id="pageTitle">Dashboard</h2><input id="search" class="search" placeholder="Search child, parent, email, notes…" oninput="render()"></div><div class="toptools"><select id="globalCohort" class="cohortSelect" onchange="setCohort(this.value)"></select><div class="status" id="status"></div></div></div><div class="content" id="content"></div></main></div><div class="modal" id="modal"><div class="modalbox"><div class="modalhead"><h2 id="modalTitle"></h2><button class="btn soft" onclick="closeModal()">Close</button></div><div class="modalbody" id="modalBody"></div></div></div>
<script>
let data=normalize(decodeInitial());let page='dashboard';let selected=new Set();let cohortFilter='';let currentRows=[];
const pages=[['dashboard','Overview','Dashboard'],['screening','Onboarding','Screening Review'],['eligible','Onboarding','Eligible'],['ineligible','Onboarding','Ineligible'],['participants','Participants','All Participants'],['prescreening','Participants','Prescreening'],['consent','Participants','Consent'],['ready','Participants','Ready for DARTS'],['followup','Operations','Manual Contact Queue'],['matching','Operations','Matching Center'],['cohorts','Reports & Admin','Cohorts'],['reports','Reports & Admin','Reports'],['admin','Reports & Admin','Admin / Webhooks']];
function decodeInitial(){try{return JSON.parse(atob(window.__INITIAL_DATA__||''));}catch(e){return {error:String(e)}}}
function normalize(x){x=x&&typeof x==='object'?x:{};['participants','screening','eligibleParticipants','ineligibleParticipants','followups','needsReview','ready','matchReview','unmatchedConsents','prescreens','consents','cohorts','activity','dashboardRows'].forEach(k=>{if(!Array.isArray(x[k]))x[k]=[]});x.metrics=x.metrics||{};x.reports=x.reports||{actionItems:[]};x.reports.actionItems=Array.isArray(x.reports.actionItems)?x.reports.actionItems:[];x.urls=x.urls||{};return x}
function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function attr(v){return esc(v).replace(/'/g,'&#39;')}
function badge(v){v=String(v||'Missing');let c=/yes|approved|eligible|completed|matched|ready/i.test(v)?'yes':/no|not eligible|ineligible|missing/i.test(v)?'no':/review|pending|needs/i.test(v)?'warn':'blue';return `<span class="badge ${c}">${esc(v)}</span>`}
function setStatus(t){document.getElementById('status').textContent=t||`Loaded from spreadsheet: ${new Date(data.generatedAt||Date.now()).toLocaleString()}`}
function cohortKey(p){return p.cohortId||p['Cohort ID']||p.cohortName||p['Cohort Name']||''}function cohortLabel(p){return [p.cohortId||p['Cohort ID'],p.cohortName||p['Cohort Name']].filter(Boolean).join(' — ')||cohortKey(p)}
function cohortsList(){const m=new Map();[...data.participants,...data.prescreens,...data.consents].forEach(p=>{const k=cohortKey(p);if(k&&!m.has(k))m.set(k,cohortLabel(p))});return [...m.entries()].sort((a,b)=>a[1].localeCompare(b[1]))}
function renderCohortSelect(){const el=document.getElementById('globalCohort');const opts=cohortsList();el.innerHTML=`<option value="">All Cohorts</option>`+opts.map(([k,l])=>`<option value="${attr(k)}" ${cohortFilter===k?'selected':''}>${esc(l)}</option>`).join('')}
function setCohort(v){cohortFilter=v;selected.clear();render()}function byCohort(rows){return !cohortFilter?rows:rows.filter(p=>cohortKey(p)===cohortFilter)}
function nav(){let html='',last='';pages.forEach(([id,sec,label])=>{if(sec!==last){html+=`<div class="section">${esc(sec)}</div>`;last=sec}html+=`<button class="nav ${page===id?'active':''}" onclick="show('${id}')"><span>${esc(label)}</span><span class="count">${countFor(id)}</span></button>`});document.getElementById('nav').innerHTML=html}
function countFor(id){return ({screening:byCohort(data.participants).length,eligible:byCohort(data.eligibleParticipants).length,ineligible:byCohort(data.ineligibleParticipants).length,participants:byCohort(data.participants).length,prescreening:byCohort(data.prescreens).length,consent:byCohort(data.consents).length,ready:byCohort(data.ready).length,followup:byCohort(data.followups).length,matching:byCohort(data.matchReview).length+byCohort(data.unmatchedConsents).length,cohorts:data.cohorts.length})[id]??''}
function show(id){page=id;selected.clear();render()}function render(){data=normalize(data);renderCohortSelect();nav();document.getElementById('pageTitle').textContent=(pages.find(p=>p[0]===page)||[])[2]||'Dashboard';({dashboard,screening,eligible:()=>participantTable('Eligible Participants',byCohort(data.eligibleParticipants)),ineligible:()=>participantTable('Ineligible Participants',byCohort(data.ineligibleParticipants)),participants:()=>participantTable('All Participants',filter(byCohort(data.participants))),prescreening:()=>simple('Prescreening Submissions',byCohort(data.prescreens),['ResponseID','Submitted At','Cohort ID','Cohort Name','Child Full Name','Neurodivergent Response','Parent/Caretaker Name','Parent Email']),consent:()=>simple('Consent Submissions',byCohort(data.consents),['ResponseID','Submitted At','Cohort ID','Cohort Name','Child Full Name','Parent Full Name','Parent Email','Consent Status']),ready:()=>participantTable('Ready for DARTS',byCohort(data.ready)),followup:()=>participantTable('Manual Contact Queue',byCohort(data.followups)),matching,cohorts,reports,admin}[page]||dashboard)();setStatus()}
function content(h){document.getElementById('content').innerHTML=h}function cards(items){return `<div class="cards">${items.map(i=>`<div class="card"><small>${esc(i[0])}</small><strong>${esc(i[1]||0)}</strong><p class="status">${esc(i[2]||'')}</p></div>`).join('')}</div>`}
function dashboard(){const rows=byCohort(data.participants),m=data.metrics;content(`<section class="hero"><h2>Enrollment Onboarding Command Center</h2><p>Workbook-powered review of prescreening, staff eligibility decisions, consent receipt, manual contact, and DARTS readiness.</p></section>${cards([['Prescreened',rows.length||m.prescreened,'Current cohort filter'],['Pending Review',rows.filter(p=>p.humanEligibilityDecision==='Pending Review').length,'Need staff decision'],['Approved Eligible',rows.filter(p=>p.humanEligibilityDecision==='Approved Eligible').length,'Can receive consent link'],['Ineligible',rows.filter(p=>p.humanEligibilityDecision==='Not Eligible').length,'Screened out by staff'],['Consent Submitted',byCohort(data.consents).length,'Consent records received'],['Ready for DARTS',byCohort(data.ready).length,'Eligible and consent complete']])}<div class="grid2"><div class="panel"><h3>Action Items</h3><div class="body">${(data.reports.actionItems||[]).map(a=>`<p><strong>${esc(a.value)}</strong> ${esc(a.label)}</p>`).join('')||'<p class="empty">No action items.</p>'}</div></div><div class="panel"><h3>Recent Activity</h3><div class="body">${(data.activity||[]).map(a=>`<p><strong>${esc(a.type)}</strong> — ${esc(a.title)}<br><small>${esc(a.detail)} ${esc(a.when)}</small></p>`).join('')||'<p class="empty">No recent activity.</p>'}</div></div></div>`)}
function filters(){return `<div class="filters"><select id="fDecision" onchange="render()"><option value="">All eligibility</option><option>Pending Review</option><option>Approved Eligible</option><option>Not Eligible</option><option>Needs More Information</option></select><button class="btn success" onclick="batch('Approved Eligible')">Approve selected eligible</button><button class="btn danger" onclick="batch('Not Eligible')">Mark selected ineligible</button><button class="btn soft" onclick="batch('Needs More Information')">Needs more info</button><button class="btn soft" onclick="exportCurrentRows()">Export current view</button></div>`}
function filter(rows){const q=(document.getElementById('search')?.value||'').toLowerCase(),fd=document.getElementById('fDecision')?.value||'';return rows.filter(p=>{const hay=[p.childName,p.parentName,p.parentEmail,p.parentPhone,p.supportDetails,p.notes,p.cohortId,p.cohortName,p.humanEligibilityDecision].join(' ').toLowerCase();return(!q||hay.includes(q))&&(!fd||p.humanEligibilityDecision===fd)})}
function screening(){participantTable('Screening Review',filter(byCohort(data.participants)),true)}
function participantTable(title,rows,selectable){currentRows=rows;content(`${selectable?filters():'<div class="filters"><button class="btn soft" onclick="exportCurrentRows()">Export current view</button></div>'}<div class="tablewrap"><table><thead><tr>${selectable?'<th><input type="checkbox" onchange="toggleAll(this.checked)"></th>':''}<th>Child</th><th>Parent</th><th>Cohort</th><th>Neurodivergent</th><th>System Suggestion</th><th>Human Decision</th><th>Consent</th><th>Ready</th><th>Support Details</th><th></th></tr></thead><tbody>${rows.map(p=>`<tr>${selectable?`<td><input type="checkbox" ${selected.has(p.enrollmentId)?'checked':''} onchange="toggleOne('${attr(p.enrollmentId)}',this.checked)"></td>`:''}<td><div class="name">${esc(p.childName||p['Child Full Name'])}</div><div class="small">${esc(p.enrollmentId||p.EnrollmentID)}</div></td><td>${esc(p.parentName||p['Parent/Caretaker Name'])}<br><span class="small">${esc(p.parentEmail||p['Parent Email'])}<br>${esc(p.parentPhone||p['Parent Phone'])}</span></td><td>${esc(p.cohortId||p['Cohort ID'])}<br><span class="small">${esc(p.cohortName||p['Cohort Name'])}</span></td><td>${badge(p.neurodivergentResponse||p['Neurodivergent Response'])}</td><td>${badge(p.systemEligibilitySuggestion||p['System Eligibility Suggestion'])}</td><td>${badge(p.humanEligibilityDecision||p['Human Eligibility Decision'])}</td><td>${badge(p.consentStatus||p['Consent Status']||'Pending')}</td><td>${badge(p.readyForDarts||p['Ready for DARTS'])}</td><td><div class="preview" title="${attr(p.supportDetails||p['Diagnostic/Support Details']||p['Support Details'])}">${esc(p.supportDetails||p['Diagnostic/Support Details']||p['Support Details'])}</div></td><td><button class="btn soft" onclick="openParticipant('${attr(p.enrollmentId||p.EnrollmentID)}')">Open</button></td></tr>`).join('')||`<tr><td class="empty" colspan="${selectable?10:9}">No records found.</td></tr>`}</tbody></table></div>`)}
function toggleOne(id,on){on?selected.add(id):selected.delete(id)}function toggleAll(on){filter(byCohort(data.participants)).forEach(p=>on?selected.add(p.enrollmentId):selected.delete(p.enrollmentId));render()}function batch(decision){if(!selected.size)return alert('Select at least one participant.');const reason=prompt('Decision reason / notes (optional):','Batch reviewed from dashboard.')||'';setStatus('Saving batch decision…');google.script.run.withSuccessHandler(d=>{data=normalize(d);selected.clear();render();setStatus('Batch decision saved.')}).withFailureHandler(e=>setStatus('Batch error: '+(e.message||e))).batchUpdateScreeningReview({enrollmentIds:[...selected],decision,reason})}
function openParticipant(id){const p=data.participants.find(x=>x.enrollmentId===id);if(!p)return;modal(p.childName,`<div class="formgrid"><div class="field"><label>Child Name</label><input id="coreChild" value="${attr(p.childName)}"></div><div class="field"><label>Parent Name</label><input id="coreParent" value="${attr(p.parentName)}"></div><div class="field"><label>Parent Email</label><input id="coreEmail" value="${attr(p.parentEmail)}"></div><div class="field"><label>Parent Phone</label><input id="corePhone" value="${attr(p.parentPhone)}"></div><div class="field"><label>Cohort ID</label><input id="coreCohortId" value="${attr(p.cohortId)}"></div><div class="field"><label>Cohort Name</label><input id="coreCohortName" value="${attr(p.cohortName)}"></div><div class="field"><label>Site</label><input id="coreSite" value="${attr(p.site)}"></div><div class="field"><label>Program Term</label><input id="coreTerm" value="${attr(p.programTerm)}"></div></div><button class="btn soft" onclick="saveCore('${attr(id)}')">Save Participant / Cohort Data</button><hr><div class="formgrid"><div>${info('Enrollment ID',p.enrollmentId)}${info('Neurodivergent',p.neurodivergentResponse)}${info('System Suggestion',p.systemEligibilitySuggestion)}</div><div>${info('Consent',p.consentStatus)}${info('Match',`${p.matchStatus||''} ${p.matchConfidenceScore||0}%`)}${info('Ready',p.readyForDarts)}</div></div><div class="field"><label>Original Support Details</label><textarea readonly>${esc(p.originalSupportDetails)}</textarea></div><div class="field"><label>System Reason</label><textarea readonly>${esc(p.systemEligibilityReason)}</textarea></div><div class="formgrid"><div class="field"><label>Human Eligibility Decision</label><select id="dec"><option>Pending Review</option><option>Approved Eligible</option><option>Not Eligible</option><option>Needs More Information</option></select></div><div class="field"><label>Manual Contact Status</label><select id="contact"><option>Not Needed</option><option>Not Started</option><option>Contacted</option><option>Parent Responded</option><option>Completed</option></select></div></div><div class="field"><label>Decision Reason</label><input id="reason" value="${attr(p.decisionReason)}"></div><div class="field"><label>Updated Support Details</label><textarea id="updated">${esc(p.updatedSupportDetails)}</textarea></div><div class="field"><label>Parent Response Summary</label><textarea id="summary">${esc(p.parentResponseSummary)}</textarea></div><div class="field"><label>Reviewer / PI Notes</label><textarea id="notes">${esc(p.notes||p.piNotes)}</textarea></div><button class="btn primary" onclick="saveParticipant('${attr(id)}')">Save Screening Review</button>`);setVal('dec',p.humanEligibilityDecision||'Pending Review');setVal('contact',p.manualContactStatus||'Not Needed')}
function saveCore(id){setStatus('Saving participant data…');google.script.run.withSuccessHandler(d=>{data=normalize(d);closeModal();render();setStatus('Participant data saved.')}).withFailureHandler(e=>setStatus('Save error: '+(e.message||e))).updateParticipantCoreData({enrollmentId:id,childName:val('coreChild'),parentName:val('coreParent'),parentEmail:val('coreEmail'),parentPhone:val('corePhone'),cohortId:val('coreCohortId'),cohortName:val('coreCohortName'),site:val('coreSite'),programTerm:val('coreTerm')})}
function saveParticipant(id){const decision=val('dec');setStatus('Saving screening review…');google.script.run.withSuccessHandler(d=>{data=normalize(d);closeModal();render();setStatus('Screening review saved.')}).withFailureHandler(e=>setStatus('Save error: '+(e.message||e))).updateScreeningReview({enrollmentId:id,'Human Eligibility Decision':decision,'Eligibility Review Status':decision==='Approved Eligible'?'Eligible':decision==='Not Eligible'?'Ineligible':decision==='Needs More Information'?'Needs More Information':'Pending Review','Manual Contact Needed':decision==='Needs More Information'?'Yes':'No','Manual Contact Status':val('contact'),'Decision Reason':val('reason'),'Updated Support Details':val('updated'),'Parent Response Summary':val('summary'),'Notes':val('notes')})}
function matching(){const rows=byCohort(data.matchReview);content(`<div class="grid2"><div class="panel"><h3>Match Review (below 60% only)</h3><div class="body">${matchTable(rows)}</div></div><div class="panel"><h3>Unmatched Consent</h3><div class="body">${simpleTable(byCohort(data.unmatchedConsents),['Consent ResponseID','Child Full Name','Best Prescreening Match','Best Match Score','Review Status'])}</div></div></div>`)}
function matchTable(rows){return `<div class="tablewrap"><table><thead><tr><th>EnrollmentID</th><th>Child</th><th>Status</th><th>Score</th><th>Possible Consent Matches</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.EnrollmentID)}</td><td>${esc(r['Child Full Name'])}</td><td>${badge(r['Match Status'])}</td><td>${esc(r['Match Confidence Score'])}</td><td>${esc(r['Possible Consent Matches'])}</td><td><button class="btn soft" onclick="approveFirstMatch('${attr(r.EnrollmentID)}','${attr(firstConsentId(r['Possible Consent Matches']))}')">Approve</button></td></tr>`).join('')||'<tr><td class="empty" colspan="6">No match review records.</td></tr>'}</tbody></table></div>`}
function firstConsentId(text){const m=String(text||'').match(/^(\S+)/);return m?m[1]:''}function approveFirstMatch(enrollmentId,consentId){if(!consentId)return alert('No consent ID found in possible matches.');if(!confirm('Approve this consent match?'))return;google.script.run.withSuccessHandler(d=>{data=normalize(d);render();setStatus('Match approved.')}).withFailureHandler(e=>setStatus('Match error: '+(e.message||e))).approveConsentMatch({enrollmentId,consentResponseId:consentId,notes:'Approved from dashboard.'})}
function simple(title,rows,cols){currentRows=rows;content(`<div class="filters"><button class="btn soft" onclick="exportCurrentRows()">Export current view</button></div><div class="panel"><h3>${esc(title)}</h3><div class="body">${simpleTable(rows,cols)}</div></div>`)}function simpleTable(rows,cols){return `<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c]??r[c.charAt(0).toLowerCase()+c.slice(1)]??'')}</td>`).join('')}</tr>`).join('')||`<tr><td class="empty" colspan="${cols.length}">No records.</td></tr>`}</tbody></table></div>`}
function cohorts(){simple('Cohorts',data.cohorts,['cohortId','cohortName','site','programTerm','prescreened','consentSubmitted','masterRecords','readyForDarts'])}function reports(){content(`<div class="panel"><h3>Reports</h3><div class="body"><button class="btn soft" onclick="exportRows(byCohort(data.eligibleParticipants),'eligible_participants.csv')">Export Eligible</button> <button class="btn soft" onclick="exportRows(byCohort(data.ineligibleParticipants),'ineligible_participants.csv')">Export Ineligible</button><br><br>${simpleTable(data.reports.actionItems||[],['label','value'])}</div></div>`)}function admin(){content(`<div class="panel"><h3>Webhook URLs</h3><div class="body"><p><strong>Prescreening:</strong><br>${esc(data.urls.prescreeningWebhook)}</p><p><strong>Consent:</strong><br>${esc(data.urls.consentWebhook)}</p><p class="status">Email automation and Power Automate bridge features are no longer active in this dashboard.</p></div></div>`)}
function exportCurrentRows(){exportRows(currentRows,`${page || 'records'}_export.csv`)}function exportRows(rows,name){rows=rows||[];if(!rows.length)return alert('No rows to export.');const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];const csv=[keys.join(','),...rows.map(r=>keys.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function info(k,v){return `<p><small>${esc(k)}</small><br><strong>${esc(v||'')}</strong></p>`}function val(id){return document.getElementById(id)?.value||''}function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v}function modal(t,b){document.getElementById('modalTitle').textContent=t||'';document.getElementById('modalBody').innerHTML=b||'';document.getElementById('modal').style.display='flex'}function closeModal(){document.getElementById('modal').style.display='none'}
render();
</script>
